apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  SPRING_PROFILES_ACTIVE: "prod"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-crm-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-crm
  template:
    metadata:
      labels:
        app: customer-crm
    spec:
      containers:
      - name: app
        image: customer-crm-app:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: app-config
        resources:
          limits:
            memory: "1Gi"
            cpu: "1000m"
          requests:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: customer-crm-service
spec:
  type: LoadBalancer
  selector:
    app: customer-crm
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
