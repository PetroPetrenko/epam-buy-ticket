<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 50px; }
        .search-box { margin-bottom: 30px; }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Customer Management</h1>
        <div>
            <a href="/planner" class="btn btn-outline-primary me-2">Booking Planner</a>
            <a href="/add" class="btn btn-primary">Add Customer</a>
        </div>
    </div>

    <div class="search-box">
        <form id="searchForm" action="/" method="get" class="input-group">
            <input type="text" id="searchInput" name="q" class="form-control" placeholder="Quick search..." th:value="${query}" autocomplete="off">
            <button class="btn btn-outline-secondary" type="submit">Search</button>
        </form>
    </div>

    <table class="table table-hover shadow-sm bg-white rounded">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="customerTableBody">
            <tr th:each="c : ${customers}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.name}"></td>
                <td th:text="${c.email}"></td>
                <td th:text="${c.phone}"></td>
                <td th:text="${c.address}"></td>
                <td>
                    <button class="btn btn-sm btn-info ai-summarize" th:data-id="${c.id}">AI Summarize</button>
                    <button class="btn btn-sm btn-danger delete-btn" th:data-id="${c.id}">Delete</button>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <nav id="paginationContainer" th:if="${totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/(page=${currentPage - 1}, q=${query})}">Previous</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="${currentPage + 1} + ' / ' + ${totalPages}"></span>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/(page=${currentPage + 1}, q=${query})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

<!-- Modal for AI -->
<div class="modal fade" id="aiModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">AI Summary</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="aiResult">
                Loading...
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const csrfToken = [[${_csrf.token}]];
    const csrfHeader = [[${_csrf.headerName}]];

    const searchInput = document.getElementById('searchInput');
    const tableBody = document.getElementById('customerTableBody');
    const paginationContainer = document.getElementById('paginationContainer');

    // Debounce function
    function debounce(func, timeout = 300) {
        let timer;
        return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => { func.apply(this, args); }, timeout);
        };
    }

    const performSearch = async (query) => {
        try {
            const url = query.length > 0 
                ? `/api/v1/customers/search?q=${encodeURIComponent(query)}&size=10`
                : `/api/v1/customers?size=10`;
            
            const res = await fetch(url);
            const data = await res.json();
            
            // Update table body
            if (data.content.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No customers found</td></tr>';
            } else {
                tableBody.innerHTML = data.content.map(c => `
                    <tr>
                        <td>${c.id}</td>
                        <td>${c.name}</td>
                        <td>${c.email}</td>
                        <td>${c.phone || ''}</td>
                        <td>${c.address}</td>
                        <td>
                            <button class="btn btn-sm btn-info ai-summarize" data-id="${c.id}">AI Summarize</button>
                            <button class="btn btn-sm btn-danger delete-btn" data-id="${c.id}">Delete</button>
                        </td>
                    </tr>
                `).join('');
            }

            // Update pagination (simple version: hide if searching)
            if (paginationContainer) {
                paginationContainer.style.display = query.length > 0 ? 'none' : 'block';
            }
        } catch (e) {
            console.error('Search error:', e);
        }
    };

    const processChange = debounce((e) => performSearch(e.target.value));

    searchInput.addEventListener('input', processChange);

    // Event delegation for AI Summarize and Delete buttons
    document.addEventListener('click', async (e) => {
        if (e.target.classList.contains('ai-summarize')) {
            const btn = e.target;
            const id = btn.getAttribute('data-id');
            const modal = new bootstrap.Modal(document.getElementById('aiModal'));
            document.getElementById('aiResult').innerText = 'AI is thinking...';
            modal.show();
            
            try {
                const res = await fetch(`/api/v1/customers/${id}/ai/summarize`);
                const text = await res.text();
                document.getElementById('aiResult').innerText = text;
            } catch (err) {
                document.getElementById('aiResult').innerText = 'Error: ' + err.message;
            }
        }

        if (e.target.classList.contains('delete-btn')) {
            const btn = e.target;
            if (confirm('Are you sure?')) {
                const id = btn.getAttribute('data-id');
                
                const headers = {};
                if (csrfHeader && csrfToken) {
                    headers[csrfHeader] = csrfToken;
                }

                await fetch(`/api/v1/customers/${id}`, { 
                    method: 'DELETE',
                    headers: headers
                });
                location.reload();
            }
        }
    });
</script>
</body>
</html>
