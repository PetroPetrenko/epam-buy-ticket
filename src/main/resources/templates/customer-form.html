<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Customer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h2 class="mb-0">Add New Customer</h2>
        </div>
        <div class="card-body">
            <form id="customerForm">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="e.g. john@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="tel" name="phone" class="form-control" placeholder="e.g. +1 212 555 0199">
                </div>
                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <input type="text" name="address" class="form-control" placeholder="e.g. 123 Broadway, New York, NY">
                </div>
                <div class="mb-3">
                    <label class="form-label">Notes (AI will use this)</label>
                    <textarea name="notes" class="form-control" rows="3" placeholder="e.g. Prefers business class, Hilton hotels, allergic to peanuts..."></textarea>
                    <div class="form-text">Mention preferences, allergies, or travel habits for better AI recommendations.</div>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="/" class="btn btn-secondary">Back</a>
                    <button type="submit" class="btn btn-success">Save Customer</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const csrfToken = [[${_csrf.token}]];
    const csrfHeader = [[${_csrf.headerName}]];

    document.getElementById('customerForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        const headers = {
            'Content-Type': 'application/json'
        };
        if (csrfHeader && csrfToken) {
            headers[csrfHeader] = csrfToken;
        }

        const res = await fetch('/api/v1/customers', {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(data)
        });
        
        if (res.ok) {
            window.location.href = '/';
        } else {
            const err = await res.json();
            alert('Error: ' + (err.detail || err.message || 'Unknown error'));
        }
    };
</script>
</body>
</html>
