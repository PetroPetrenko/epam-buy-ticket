# ══════════════════════════════════════════════════════════════════════════════
#  application.properties
# ══════════════════════════════════════════════════════════════════════════════

server.port=8082

# ── Database (H2 for local testing) ─────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:customersdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# ── Redis (Disabled for local testing) ───────────────────────────────────────
spring.cache.type=none

# ── Spring AI Vector Store (Simple Store) ───────────────────────────────────
spring.ai.vectorstore.pgvector.enabled=false

# ── Docker Compose Support (Disabled) ─────────────────────────────────────────
spring.docker.compose.enabled=false
spring.docker.compose.lifecycle-management=none

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=false

# ── Exclusions ────────────────────────────────────────────────────────────────
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,org.springframework.boot.autoconfigure.docker.compose.DockerComposeAutoConfiguration

# ── MULTI-AI Configuration (Failover) ────────────────────────────────────────
# Провайдер 1: Groq (Основной)
app.ai.providers[0].name=Groq
app.ai.providers[0].api-key=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
app.ai.providers[0].base-url=https://api.groq.com/openai
app.ai.providers[0].model=llama-3.3-70b-versatile

# Провайдер 2: OpenAI (Резервный)
app.ai.providers[1].name=OpenAI
app.ai.providers[1].api-key=${OPENAI_API_KEY:demo}
app.ai.providers[1].base-url=https://api.openai.com/v1
app.ai.providers[1].model=gpt-3.5-turbo

# Старые настройки (для совместимости со стартером)
spring.ai.openai.api-key=${app.ai.providers[0].api-key}
spring.ai.openai.base-url=${app.ai.providers[0].base-url}

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML

# ── Video Generation (Luma AI) ────────────────────────────────────────────────
app.luma.api-key=luma-api-8syl64iOu2AiN1qrHF65mVpPgmIrRPOaM0QQ-8GOFdQ
app.luma.base-url=https://api.lumalabs.ai/v1

# ── Booking API (RapidAPI) ──────────────────────────────────────────────────
app.booking.api-key=b4c79e4715msh6fe99ee08de0a81p1427b1jsn8b2b13cb2275
app.booking.host=apidojo-booking-v1.p.rapidapi.com
app.booking.base-url=https://apidojo-booking-v1.p.rapidapi.com

# ── Duffy CI/CD Infrastructure ──────────────────────────────────────────────
app.duffy.tenant-name=my-duffy-tenant
app.duffy.private-key-path=CI_CD/my-duffy-tenant_id_rsa

# ── Email Configuration (Spring Mail) ───────────────────────────────────────
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=demo
spring.mail.password=demo
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.example.customer=DEBUG

# ── DevOps & Monitoring (Actuator) ──────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,beans
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoint.health.probes.enabled=true

# ── OpenAPI ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
